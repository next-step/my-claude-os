spring:
  datasource:
    url: jdbc:h2:file:./data/habitdb    # 파일 기반 — 재시작해도 데이터 유지
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update                  # 엔티티 변경 시 자동 ALTER
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console                 # http://localhost:8080/h2-console

  thymeleaf:
    cache: false                        # 개발 중 템플릿 즉시 반영

server:
  port: 8080

logging:
  level:
    com.habit: DEBUG
