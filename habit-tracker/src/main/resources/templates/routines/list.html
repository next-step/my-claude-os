<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('루틴 관리')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: nav('routines')}"></nav>

<div class="container py-4">
    <h4 class="fw-bold mb-4">루틴 관리</h4>

    <!-- ===================================================
         성공 플래시 메시지 (루틴 추가 완료 피드백)
         - 백엔드: RedirectAttributes.addFlashAttribute("successMessage", name + " 루틴이 추가됐어요!")
         - 3초 후 자동 제거
         =================================================== -->
    <div th:if="${successMessage}"
         id="success-flash"
         class="d-flex align-items-center gap-2 rounded-3 p-3 mb-3"
         style="background-color: var(--color-success-light);
                color: var(--color-success);
                border: 1px solid var(--color-success);"
         role="alert">
        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close btn-close ms-auto"
                onclick="document.getElementById('success-flash').remove()"
                aria-label="메시지 닫기"></button>
    </div>

    <!-- 루틴 추가 폼 -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-plus-circle me-1 text-primary"></i>새 루틴 추가
        </div>
        <div class="card-body">
            <form th:action="@{/routines}" th:object="${form}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="routine-name">
                        루틴 이름 <span class="text-danger" aria-hidden="true">*</span>
                    </label>
                    <input type="text" id="routine-name" class="form-control"
                           th:field="*{name}" placeholder="예: 아침 스트레칭"
                           th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''"
                           aria-required="true">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold" for="routine-desc">설명 (선택)</label>
                    <input type="text" id="routine-desc" class="form-control"
                           th:field="*{description}" placeholder="간단한 설명">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">반복 요일</label>
                    <div class="d-flex flex-wrap gap-2" role="group" aria-label="반복 요일 선택">
                        <div th:each="day : ${ {'MON','TUE','WED','THU','FRI','SAT','SUN'} }">
                            <input type="checkbox" class="btn-check" th:id="${'day-' + day}"
                                   name="days" th:value="${day}"
                                   th:checked="${#lists.contains(form.days, day)}">
                            <label class="btn btn-outline-primary btn-sm"
                                   th:for="${'day-' + day}"
                                   th:text="${day == 'MON' ? '월' : day == 'TUE' ? '화' : day == 'WED' ? '수' :
                                            day == 'THU' ? '목' : day == 'FRI' ? '금' : day == 'SAT' ? '토' : '일'}">월</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>추가하기
                </button>
            </form>
        </div>
    </div>

    <!-- 루틴 목록 -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-list-task me-1 text-primary"></i>
            내 루틴 <span class="badge bg-primary ms-1" th:text="${#lists.size(routines)}">0</span>
        </div>

        <!-- ===================================================
             루틴 아이템 — 인라인 2단계 "그만하기" 확인 패턴
             - confirm() 제거: 브라우저 네이티브 다이얼로그 → 디자인 시스템 통제 밖
             - 1단계: "그만하기" 버튼 클릭 → 확인 행 인라인 표시 + 배경 변경
             - 2단계: [취소] or [그만하기] 선택
             - 최종 제출: 서버 폼 → PRG 패턴 (JS 없어도 라우팅은 유지됨)
             =================================================== -->
        <div class="list-group list-group-flush" th:if="${!#lists.isEmpty(routines)}">
            <div class="list-group-item routine-item py-3"
                 th:each="r : ${routines}"
                 th:id="|routine-${r.id}|">

                <!-- 기본 행: 루틴 정보 + "그만하기" 버튼 -->
                <div class="d-flex align-items-center"
                     th:id="|routine-main-${r.id}|">
                    <div class="flex-grow-1">
                        <div class="fw-semibold" th:text="${r.name}"></div>
                        <small class="text-muted"
                               th:if="${r.description != null and !r.description.isEmpty()}"
                               th:text="${r.description}"></small>
                        <div class="mt-1">
                            <span th:each="day : ${r.dayList}"
                                  class="badge bg-secondary-subtle text-secondary me-1"
                                  th:text="${day == 'MON' ? '월' : day == 'TUE' ? '화' : day == 'WED' ? '수' :
                                           day == 'THU' ? '목' : day == 'FRI' ? '금' : day == 'SAT' ? '토' : '일'}"></span>
                        </div>
                    </div>
                    <!-- "삭제" 대신 "그만하기" (POLICY §4-3 네이밍 가이드) -->
                    <button type="button"
                            class="btn btn-outline-secondary btn-sm"
                            th:onclick="|showDeleteConfirm(${r.id})|"
                            th:attr="aria-label=${r.name} + ' 그만하기'">
                        그만하기
                    </button>
                </div>

                <!-- 확인 행: "그만하기" 클릭 후 인라인 표시 (초기 hidden) -->
                <div class="d-none pt-2 d-flex align-items-center"
                     th:id="|confirm-${r.id}|">
                    <span class="text-danger me-3 flex-grow-1"
                          style="font-size: 14px; font-weight: 500;">
                        정말 그만할까요?
                    </span>
                    <button type="button"
                            class="btn btn-sm btn-outline-secondary me-2"
                            th:onclick="|hideDeleteConfirm(${r.id})|">
                        취소
                    </button>
                    <form th:action="@{/routines/{id}/delete(id=${r.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-danger"
                                th:attr="aria-label=${r.name} + ' 그만하기 최종 확인'">
                            그만하기
                        </button>
                    </form>
                </div>

            </div>
        </div>

        <!-- ===================================================
             빈 상태 (POLICY §4-2, §4-3)
             - bi-seedling: 첫 루틴 시작 맥락 (POLICY §4-3 예시와 일치)
             - CTA 불필요: 바로 위 추가 폼이 있음
             =================================================== -->
        <div class="card-body text-center py-5" th:if="${#lists.isEmpty(routines)}">
            <i class="bi bi-seedling" style="font-size: 2rem; color: var(--color-text-3);"></i>
            <p class="mt-2 mb-0" style="font-size: 14px; color: var(--color-text-2);">
                아직 루틴이 없어요. 첫 루틴을 만들어볼까요?
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
/**
 * 인라인 2단계 "그만하기" 확인 패턴
 * - confirm() 완전 제거 (OS/브라우저마다 UI가 달라 디자인 시스템 통제 불가)
 * - showDeleteConfirm: 확인 행 표시 + 배경을 --color-danger-light로 변경
 * - hideDeleteConfirm: 원래 상태 복귀
 */
function showDeleteConfirm(routineId) {
    var item = document.getElementById('routine-' + routineId);
    var confirmRow = document.getElementById('confirm-' + routineId);
    if (!item || !confirmRow) return;

    item.style.backgroundColor = 'var(--color-danger-light)';
    confirmRow.classList.remove('d-none');
}

function hideDeleteConfirm(routineId) {
    var item = document.getElementById('routine-' + routineId);
    var confirmRow = document.getElementById('confirm-' + routineId);
    if (!item || !confirmRow) return;

    item.style.backgroundColor = '';
    confirmRow.classList.add('d-none');
}
</script>
<script th:if="${successMessage}">
// 성공 플래시 메시지 3초 후 자동 제거
setTimeout(function () {
    var flash = document.getElementById('success-flash');
    if (flash) flash.remove();
}, 3000);
</script>
</body>
</html>
