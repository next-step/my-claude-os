<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('루틴 관리')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: nav('routines')}"></nav>

<div class="container py-4">
    <h4 class="fw-bold mb-4">루틴 관리</h4>

    <!-- 루틴 추가 폼 -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-plus-circle me-1 text-primary"></i>새 루틴 추가
        </div>
        <div class="card-body">
            <form th:action="@{/routines}" th:object="${form}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">루틴 이름 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" th:field="*{name}" placeholder="예: 아침 스트레칭"
                           th:classappend="${#fields.hasErrors('name')} ? ' is-invalid' : ''">
                    <div class="invalid-feedback" th:errors="*{name}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">설명 (선택)</label>
                    <input type="text" class="form-control" th:field="*{description}" placeholder="간단한 설명">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">반복 요일</label>
                    <div class="d-flex flex-wrap gap-2">
                        <div th:each="day : ${ {'MON','TUE','WED','THU','FRI','SAT','SUN'} }">
                            <input type="checkbox" class="btn-check" th:id="${'day-' + day}"
                                   name="days" th:value="${day}"
                                   th:checked="${#lists.contains(form.days, day)}">
                            <label class="btn btn-outline-primary btn-sm"
                                   th:for="${'day-' + day}"
                                   th:text="${day == 'MON' ? '월' : day == 'TUE' ? '화' : day == 'WED' ? '수' :
                                            day == 'THU' ? '목' : day == 'FRI' ? '금' : day == 'SAT' ? '토' : '일'}">월</label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-1"></i>추가
                </button>
            </form>
        </div>
    </div>

    <!-- 루틴 목록 -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white fw-semibold">
            <i class="bi bi-list-task me-1 text-primary"></i>
            내 루틴 <span class="badge bg-primary ms-1" th:text="${#lists.size(routines)}">0</span>
        </div>
        <div class="list-group list-group-flush" th:if="${!#lists.isEmpty(routines)}">
            <div class="list-group-item d-flex align-items-center py-3"
                 th:each="r : ${routines}">
                <div class="flex-grow-1">
                    <div class="fw-semibold" th:text="${r.name}"></div>
                    <small class="text-muted" th:text="${r.description}" th:if="${r.description != null and !r.description.isEmpty()}"></small>
                    <div class="mt-1">
                        <span th:each="day : ${r.dayList}"
                              class="badge bg-secondary-subtle text-secondary me-1"
                              th:text="${day == 'MON' ? '월' : day == 'TUE' ? '화' : day == 'WED' ? '수' :
                                       day == 'THU' ? '목' : day == 'FRI' ? '금' : day == 'SAT' ? '토' : '일'}"></span>
                    </div>
                </div>
                <form th:action="@{/routines/{id}/delete(id=${r.id})}" method="post"
                      onsubmit="return confirm('이 루틴을 삭제할까요?')">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </div>
        </div>
        <div class="card-body text-center text-muted py-4" th:if="${#lists.isEmpty(routines)}">
            아직 루틴이 없습니다. 위에서 추가해보세요!
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
