<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('통계')}"></head>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: nav('stats')}"></nav>

<div class="container py-4">

    <!-- ===================================================
         페이지 헤더
         - 부제에 7일 평균 완료율 표시 (데이터 스캔 없이 현황 파악)
         - rates7이 비어있으면 부제 숨김
         =================================================== -->
    <div class="mb-4">
        <h4 class="fw-bold mb-0">통계</h4>
        <small class="text-muted"
               th:if="${rates7 != null and !rates7.isEmpty()}"
               th:text="|최근 7일 평균 완료율: ${#aggregates.avg(rates7.values()).intValue()}%|"></small>
    </div>

    <!-- ===================================================
         빈 상태 (기록 없음)
         - rates7이 비었을 때 표시
         - bi-bar-chart: 통계 화면 맥락과 일치
         =================================================== -->
    <div th:if="${rates7 == null or rates7.isEmpty()}" class="text-center py-5">
        <i class="bi bi-bar-chart" style="font-size: 3rem; color: var(--color-text-3);"></i>
        <p class="fw-semibold mt-3 mb-1" style="font-size: 15px; color: var(--color-text-2);">
            아직 기록이 없어요
        </p>
        <p class="mb-3" style="font-size: 14px; color: var(--color-text-2);">
            루틴을 체크하면 여기서 성과를 볼 수 있어요
        </p>
        <a th:href="@{/}" class="btn btn-primary">오늘 루틴 확인하기 →</a>
    </div>

    <!-- 데이터가 있을 때만 차트/목록 표시 -->
    <div th:unless="${rates7 == null or rates7.isEmpty()}">

        <!-- ===================================================
             7일 바 차트
             - 하드코딩 색상(#198754, #0d6efd, #dee2e6) → CSS 클래스로 교체
               · 100% → bg-success (#22C55E, Bootstrap 오버라이드 적용)
               · 50–99% → bg-primary (#3B82F6)
               · 0–49% → bg-secondary
             - font-size: 0.65rem(10.4px) → .chart-label(11px) 접근성 개선
             - role="img" + aria-label: 스크린 리더 지원
             =================================================== -->
        <div class="card border-0 shadow-sm mb-4">
            <div class="card-header bg-white fw-semibold">
                <i class="bi bi-calendar-week me-1 text-primary"></i>최근 7일 완료율
            </div>
            <div class="card-body">
                <div class="d-flex gap-2 align-items-end" style="height: 100px;">
                    <div th:each="entry : ${rates7}"
                         class="flex-fill d-flex flex-column align-items-center">
                        <small class="chart-label mb-1"
                               th:text="${entry.value} + '%'"></small>
                        <div class="w-100 rounded-top"
                             th:classappend="${entry.value == 100} ? 'bg-success' :
                                            (${entry.value >= 50} ? 'bg-primary' : 'bg-secondary')"
                             th:style="'height: ' + ${entry.value} + '%; min-height: 4px;'"
                             role="img"
                             th:attr="aria-label=${#temporals.format(entry.key, 'M월 d일')} + ' 완료율 ' + ${entry.value} + '%'">
                        </div>
                        <small class="chart-label mt-1"
                               th:text="${#temporals.format(entry.key, 'M/d')}"></small>
                    </div>
                </div>
            </div>
        </div>

        <!-- ===================================================
             30일 목록
             - 진행 바 색상: 이미 CSS 클래스 방식 사용 (하드코딩 없음, 유지)
             - Bootstrap 변수 오버라이드(style.css)로 색상 자동 통일
             =================================================== -->
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white fw-semibold">
                <i class="bi bi-calendar-month me-1 text-primary"></i>최근 30일 상세
            </div>
            <div class="list-group list-group-flush">
                <div th:each="entry : ${rates30}"
                     class="list-group-item d-flex align-items-center py-2">
                    <span class="text-muted me-3" style="min-width: 70px;"
                          th:text="${#temporals.format(entry.key, 'M월 d일 (E)', new java.util.Locale('ko'))}"></span>
                    <div class="flex-grow-1 progress mx-2" style="height: 8px;">
                        <div class="progress-bar"
                             th:classappend="${entry.value == 100} ? 'bg-success' : (${entry.value >= 50} ? 'bg-primary' : 'bg-secondary')"
                             th:style="'width: ' + ${entry.value} + '%'"
                             role="progressbar"
                             th:attr="aria-valuenow=${entry.value},aria-valuemin=0,aria-valuemax=100,
                                      aria-label=${#temporals.format(entry.key, 'M월 d일')} + ' 완료율 ' + ${entry.value} + '%'"></div>
                    </div>
                    <span class="fw-semibold ms-2" style="min-width: 40px; text-align: right;"
                          th:text="${entry.value} + '%'"></span>
                </div>
            </div>
        </div>

    </div><!-- /데이터 영역 -->

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
