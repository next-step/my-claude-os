<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | 습관 트래커'">습관 트래커</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<nav th:fragment="nav(active)" class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-check2-circle me-1"></i>습관 트래커
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${active == 'today'} ? ' active fw-semibold' : ''">
                        <i class="bi bi-calendar-check me-1"></i>오늘
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/routines}"
                       th:classappend="${active == 'routines'} ? ' active fw-semibold' : ''">
                        <i class="bi bi-list-task me-1"></i>루틴 관리
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/stats}"
                       th:classappend="${active == 'stats'} ? ' active fw-semibold' : ''">
                        <i class="bi bi-bar-chart-line me-1"></i>통계
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/history}"
                       th:classappend="${active == 'history'} ? ' active fw-semibold' : ''">
                        <i class="bi bi-clock-history me-1"></i>기록
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>
</html>
